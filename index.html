<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <h1>Image Gallery Design</h1>
    <div class="gallery">
        <img src="images/female1.png" alt="image 1 " class="gallery-img">
        <img src="images/female2.png" alt="image 2" class="gallery-img">
        <img src="images/female3.png" alt="image 3" class="gallery-img">
        <img src="images/female4.png" alt="image 4" class="gallery-img">
        <img src="images/female5.jpg" alt="image 5" class="gallery-img">
        <img src="images/female6.png" alt="image 6" class="gallery-img">
        <img src="images/male1.png" alt="image 7" class="gallery-img">
        <img src="images/male2.png" alt="image 8" class="gallery-img">
        <img src="images/male3.png" alt="image 9" class="gallery-img">
        <img src="images/male4.png" alt="image 10" class="gallery-img">
        <img src="images/male5.png" alt="image 10"  class="gallery-img">
        <img src="images/male6.png" alt="image 10" class="gallery-img">
       
    </div>

    <div id="lightbox" class="lightbox" >
        <span class="close">&times;</span>
        <img  id="lightbox-img" class="lightbox-img">
        <div class="lightbox-caption"></div>
        <button class="prev">&#10094;</button>
        <button class="next">&#10095;</button>
    </div>




    <script src="script.js"></script>
</body>
</html>
